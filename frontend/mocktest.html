<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mock Tests - Placement Prep</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <style>
        .subject-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 1.8rem;
            margin-top: 2rem;
        }
        .subject-card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 18px;
            padding: 1.8rem;
            cursor: pointer;
            transition: transform 0.25s ease, box-shadow 0.25s ease;
            display: flex;
            flex-direction: column;
            gap: 1rem;
            backdrop-filter: blur(12px);
        }
        .subject-card:hover {
            transform: translateY(-6px);
            box-shadow: 0 20px 40px rgba(96, 165, 250, 0.12);
        }
        .subject-card i {
            font-size: 2.5rem;
            color: var(--accent-primary);
        }
        .subject-card h3 {
            font-size: 1.35rem;
            margin: 0;
            color: var(--text-main);
        }
        .subject-card p {
            color: var(--text-muted);
            line-height: 1.6;
            flex-grow: 1;
        }
        .subject-card small {
            display: inline-block;
            margin-top: auto;
            color: var(--accent-secondary);
            font-weight: 600;
        }
        .question-section {
            margin-top: 3rem;
        }
        .question-header {
            display: flex;
            justify-content: space-between;
            gap: 1rem;
            align-items: center;
            flex-wrap: wrap;
            margin-bottom: 1.5rem;
        }
        .question-header h2 {
            margin: 0;
            font-size: 2rem;
            color: var(--text-main);
        }
        .question-header button {
            background: linear-gradient(45deg, var(--accent-primary), var(--accent-secondary));
            color: var(--text-main);
            border: none;
            border-radius: 10px;
            padding: 0.9rem 1.3rem;
            cursor: pointer;
            font-weight: 700;
            box-shadow: 0 8px 20px rgba(96,165,250,0.08);
        }
        .question-card {
            background: var(--card-bg);
            padding: 1.5rem;
            border-radius: 16px;
            border: 1px solid var(--border);
            margin-bottom: 1rem;
            transition: transform 0.2s ease;
            backdrop-filter: blur(12px);
        }
        .question-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 24px rgba(96, 165, 250, 0.1);
        }
        .question-card h4 {
            margin: 0 0 0.5rem 0;
            font-size: 1.05rem;
            color: var(--text-main);
        }
        .question-card p {
            color: var(--text-muted);
            line-height: 1.7;
            margin: 0;
        }
        .breadcrumb {
            margin-top: 0.5rem;
            font-size: 0.95rem;
            color: var(--text-muted);
        }
        .breadcrumb span {
            color: var(--accent-primary);
            cursor: pointer;
        }
        .quiz-controls {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 1rem;
            margin-bottom: 1.5rem;
        }
        .quiz-controls button {
            background: linear-gradient(45deg, #f9a8d4, #60a5fa);
            color: #0f172a;
            border: none;
            border-radius: 10px;
            padding: 0.9rem 1.3rem;
            cursor: pointer;
            font-weight: 700;
        }
        .quiz-status {
            display: flex;
            gap: 1rem;
            align-items: center;
            color: var(--text-muted);
            font-size: 0.95rem;
        }
        .quiz-status span {
            display: inline-flex;
            align-items: center;
            gap: 0.4rem;
        }
        .quiz-status .timer {
            color: var(--accent-primary);
            font-weight: 700;
        }
        .explanation {
            margin-top: 1rem;
            background: var(--panel-bg);
            border-left: 4px solid var(--accent-secondary);
            padding: 1rem;
            border-radius: 0 0 14px 14px;
            display: none;
            color: var(--text-main);
            line-height: 1.7;
            border: 1px solid var(--border);
        }
        .explain-btn {
            margin-top: 1rem;
            background: transparent;
            color: var(--accent-secondary);
            border: 1px solid rgba(96, 165, 250, 0.35);
            padding: 0.65rem 0.95rem;
            border-radius: 10px;
            cursor: pointer;
            transition: background 0.2s ease, color 0.2s ease;
        }
        .option-list {
            margin-top: 1rem;
            display: grid;
            gap: 0.75rem;
        }
        .option-item button {
            width: 100%;
            padding: 0.9rem 1rem;
            border: 1px solid var(--border);
            background: var(--input-bg, #eff6ff);
            color: var(--text-main);
            border-radius: 12px;
            cursor: pointer;
            text-align: left;
            transition: transform 0.2s ease, background 0.2s ease, border-color 0.2s ease;
        }
        .option-item button:hover {
            transform: translateY(-1px);
            border-color: rgba(96, 165, 250, 0.9);
            background: rgba(219,234,254,0.8);
        }
        .option-item button.correct {
            background: #d1fae5;
            border-color: #34d399;
            color: #064e3b;
        }
        .option-item button.wrong {
            background: #fecaca;
            border-color: #f87171;
            color: #991b1b;
        }
        .result-card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 1.5rem;
            margin-top: 1.5rem;
            backdrop-filter: blur(12px);
        }
        .result-card h3 {
            margin-top: 0;
            color: var(--accent-primary);
        }
        .result-card p {
            color: var(--text-muted);
            line-height: 1.6;
        }
        .result-answer {
            margin-top: 0.8rem;
            padding: 0.9rem 1rem;
            background: var(--panel-bg);
            border-radius: 12px;
            border: 1px solid var(--border);
            color: var(--text-main);
        }
        .result-answer.correct {
            border-color: #34d399;
            background: #d1fae5;
        }
        .result-answer.wrong {
            border-color: #f87171;
            background: #fecaca;
        }
        .leaderboard-section {
            margin-top: 2rem;
            padding: 1.5rem;
            border-radius: 18px;
            background: var(--panel-bg);
            border: 1px solid var(--border);
        }
        .leaderboard-section h3 {
            margin-top: 0;
            color: var(--accent-primary);
        }
        .leaderboard-item {
            display: grid;
            grid-template-columns: 1fr auto auto auto;
            gap: 1rem;
            align-items: center;
            padding: 0.95rem 1rem;
            border-bottom: 1px solid rgba(148, 163, 184, 0.18);
            color: var(--text-main);
        }
        .leaderboard-item:last-child {
            border-bottom: none;
        }
        .leaderboard-item span {
            color: var(--text-muted);
        }
        .leaderboard-empty {
            color: var(--text-muted);
            padding: 1rem 0;
        }
        .explain-btn:hover {
            background: rgba(56, 189, 248, 0.08);
            color: var(--text-main);
        }
        .empty-state {
            text-align: center;
            padding: 3rem 1rem;
            color: var(--text-muted);
        }
        @media (max-width: 768px) {
            .question-header {
                flex-direction: column;
                align-items: flex-start;
            }
        }

</head>
<body>
    <nav>
        <div class="logo">
            <i class="fa-solid fa-graduation-cap"></i> PlacementPrep

        <ul class="nav-links">
            <li><a href="index.html">Dashboard</a></li>

    <section class="hero">
        <h1>Mock Test Workspace</h1>
        <p>Choose a subject and launch a set of practice questions to sharpen your placement preparation.</p>
    </section>

    <main class="container">
        <div id="subjectsContainer" class="subject-grid"></div>

        <section id="questionSection" class="question-section" style="display:none;">
            <div class="question-header">
                <div>
                    <h2 id="subjectTitle">Subject Title</h2>
                    <div class="breadcrumb">Subjects <span onclick="showSubjectList()">→ Choose another subject</span></div>
                </div>
                <button type="button" onclick="showSubjectList()">Back to Subjects</button>
            </div>
            <div id="quizControls" class="quiz-controls">
                <div id="quizInfo" class="quiz-status" style="display:none;">
                    <span><i class="fa-solid fa-list-check"></i> <strong id="questionCount">0</strong> questions</span>
                    <span><i class="fa-solid fa-hourglass-half"></i> <strong class="timer" id="timerDisplay">15:00</strong></span>
                </div>
                <button id="startQuizBtn" type="button" onclick="startQuiz()">Start Quiz</button>
                <button id="submitQuizBtn" type="button" onclick="submitQuiz()" style="display:none;">Submit Quiz</button>
            </div>
            <div id="questionList" style="display:none;"></div>
            <div id="resultSummary" style="display:none;"></div>
        </section>
        <section id="leaderboardSection" class="leaderboard-section"></section>
        <div id="emptyState" class="empty-state" style="display:none;"></div>
    </main>

        // Profile setup (shared)
        function setupProfileMenu() {
            const profileBtn = document.getElementById('profileBtn');
            const profileMenu = document.getElementById('profileMenu');
            const profileEmail = document.getElementById('profileEmail');
            const logoutBtn = document.getElementById('logoutBtn');
            const isAuth = localStorage.getItem('isAuthenticated') === 'true';
            const email = localStorage.getItem('userEmail') || 'Guest';

            if (profileEmail) profileEmail.textContent = email;
            if (!isAuth && profileBtn) profileBtn.style.display = 'none';

            profileBtn?.addEventListener('click', (e) => {
                e.stopPropagation();
                const open = profileMenu.classList.toggle('open');
                profileMenu.setAttribute('aria-hidden', !open);
            });

            document.addEventListener('click', () => profileMenu?.classList.remove('open'));

            logoutBtn?.addEventListener('click', () => {
                localStorage.removeItem('isAuthenticated');
                localStorage.removeItem('userEmail');
                window.location.href = 'login.html';
            });
        }

        window.addEventListener('DOMContentLoaded', setupProfileMenu);

        const subjectsContainer = document.getElementById('subjectsContainer');
        const questionSection = document.getElementById('questionSection');
        const questionList = document.getElementById('questionList');
        const resultSummary = document.getElementById('resultSummary');
        const leaderboardSection = document.getElementById('leaderboardSection');
        const subjectTitle = document.getElementById('subjectTitle');
        const emptyState = document.getElementById('emptyState');
        const quizInfo = document.getElementById('quizInfo');
        const questionCountLabel = document.getElementById('questionCount');
        const timerDisplay = document.getElementById('timerDisplay');
        const startQuizBtn = document.getElementById('startQuizBtn');
        const submitQuizBtn = document.getElementById('submitQuizBtn');
        const API_BASE = 'http://localhost:5000/api';

        let currentSubject = null;
        let currentQuestions = [];
        let quizTimer = null;
        let secondsRemaining = 900;

        function renderSubjectCards() {
            subjectsContainer.innerHTML = '';
            subjects.forEach(subject => {
                const card = document.createElement('div');
                card.className = 'subject-card';
                card.innerHTML = `
                    <i class="${subject.iconClass}"></i>
                    <h3>${subject.title}</h3>
                    <p>${subject.shortDesc}</p>
                    <small>${subject.count} practice questions</small>
                `;
                card.onclick = () => openSubject(subject.id);
                subjectsContainer.appendChild(card);
            });
        }

        function openSubject(subjectId) {
            const subject = subjects.find(item => item.id === subjectId);
            const questions = questionBank[subjectId] || [];

            if (!subject) return;
            currentSubject = subjectId;
            currentQuestions = questions;
            secondsRemaining = questions.length * 30;
            subjectsContainer.style.display = 'none';
            questionSection.style.display = 'block';
            emptyState.style.display = 'none';
            questionList.style.display = 'none';
            quizInfo.style.display = 'none';
            startQuizBtn.style.display = 'inline-flex';
            subjectTitle.innerText = `${subject.title} Practice Questions`;
            questionCountLabel.innerText = questions.length;
            timerDisplay.innerText = formatTime(secondsRemaining);
            questionList.innerHTML = '';
            if (!questions.length) {
                emptyState.style.display = 'block';
                emptyState.innerHTML = `
                    <h3>Coming Soon</h3>
                    <p>We are preparing ${subject.title} questions for you. Check back soon!</p>
                `;
            }
        }

        function startQuiz() {
            if (!currentSubject || !currentQuestions.length) return;
            selectedAnswers.length = 0;
            selectedAnswers.push(...Array(currentQuestions.length).fill(null));
            resultSummary.style.display = 'none';
            resultSummary.innerHTML = '';
            startQuizBtn.style.display = 'none';
            submitQuizBtn.style.display = 'inline-flex';
            quizInfo.style.display = 'flex';
            questionList.style.display = 'block';
            renderQuestions(currentSubject, currentQuestions);
            startTimer();
        }

        function renderQuestions(subjectId, questions) {
            questionList.innerHTML = '';

            if (!questions.length) {
                questionList.style.display = 'none';
                emptyState.style.display = 'block';
                return;
            }

            questionList.style.display = 'block';
            questions.forEach((question, index) => {
                const questionObj = typeof question === 'string' ? {
                    question,
                    options: [],
                    answer: null,
                    explanation: 'Review the core concept and test edge cases for this problem.'
                } : question;
                const explanation = questionObj.explanation || 'Review the core concept and test edge cases for this problem.';
                const optionContent = questionObj.options && questionObj.options.length
                    ? questionObj.options.map((option, optionIndex) => `
                        <div class="option-item">
                            <button type="button" onclick="selectOption(${index}, ${optionIndex})">${option}</button>
                        </div>
                    `).join('')
                    : '<p style="color: var(--text-muted); margin-top: 1rem;">No options available for this question.</p>';

                const card = document.createElement('div');
                card.className = 'question-card';
                card.innerHTML = `
                    <h4>Question ${index + 1}</h4>
                    <p>${questionObj.question}</p>
                    <div id="option-list-${index}" class="option-list">${optionContent}</div>
                    <button class="explain-btn" type="button" onclick="toggleExplanation(${index})">Show Explanation</button>
                    <div id="explanation-${index}" class="explanation">${explanation}</div>
                `;
                questionList.appendChild(card);
            });
        }

        function startTimer() {
            clearInterval(quizTimer);
            quizTimer = setInterval(() => {
                secondsRemaining -= 1;
                if (secondsRemaining <= 0) {
                    clearInterval(quizTimer);
                    timerDisplay.textContent = '00:00';
                    showTimerComplete();
                    return;
                }
                timerDisplay.textContent = formatTime(secondsRemaining);
            }, 1000);
        }

        function formatTime(seconds) {
            const minutes = Math.floor(seconds / 60).toString().padStart(2, '0');
            const secs = (seconds % 60).toString().padStart(2, '0');
            return `${minutes}:${secs}`;
        }

        function showTimerComplete() {
            timerDisplay.textContent = 'Time up';
            const notice = document.createElement('div');
            notice.className = 'empty-state';
            notice.innerHTML = '<h3>Time is up!</h3><p>Your quiz time has ended. Review the explanations and try the next subject.</p>';
            questionList.appendChild(notice);
        }

        function toggleExplanation(index) {
            const explanation = document.getElementById(`explanation-${index}`);
            if (!explanation) return;
            explanation.style.display = explanation.style.display === 'block' ? 'none' : 'block';
        }

        function getLeaderboardData() {
            const stored = localStorage.getItem('mocktestLeaderboard');
            try {
                return stored ? JSON.parse(stored) : [];
            } catch {
                return [];
            }
        }

        async function fetchLeaderboard() {
            try {
                const response = await fetch(`${API_BASE}/leaderboard`);
                if (!response.ok) {
                    throw new Error('Failed to load leaderboard from server');
                }
                const result = await response.json();
                return Array.isArray(result.data) ? result.data : [];
            } catch (error) {
                console.warn('Leaderboard API unavailable, using local cache.', error);
                return getLeaderboardData();
            }
        }

        async function saveResultToLeaderboard(score, total, subjectId) {
            const userEmail = localStorage.getItem('userEmail') || 'Guest';
            const payload = {
                userEmail,
                subject: subjectId,
                score,
                total
            };

            try {
                const response = await fetch(`${API_BASE}/leaderboard`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(payload)
                });

                if (!response.ok) {
                    const errorResult = await response.json().catch(() => null);
                    throw new Error(errorResult?.message || 'Failed to save leaderboard entry');
                }
            } catch (error) {
                console.warn('Could not save leaderboard entry to server, storing locally instead.', error);
                const data = getLeaderboardData();
                data.unshift({
                    userEmail,
                    subject: subjectId,
                    score,
                    total,
                    date: new Date().toISOString()
                });
                localStorage.setItem('mocktestLeaderboard', JSON.stringify(data.slice(0, 50)));
            }
        }

        async function renderLeaderboard() {
            if (!leaderboardSection) return;
            const rows = await fetchLeaderboard();
            let html = `
                <h3>Leaderboard</h3>
                <div class="leaderboard-item" style="font-weight:700; color: var(--text-main);">
                    <span>User</span>
                    <span>Subject</span>
                    <span>Score</span>
                    <span>Date</span>
                </div>
            `;
            if (!rows.length) {
                html += '<div class="leaderboard-empty">No leaderboard entries yet. Submit a mock test to add your score.</div>';
            } else {
                rows.slice(0, 10).forEach(row => {
                    const createdAt = row.createdAt || row.date || row.timestamp;
                    const date = createdAt ? new Date(createdAt).toLocaleString() : 'Unknown';
                    html += `
                        <div class="leaderboard-item">
                            <span>${row.userEmail || 'Guest'}</span>
                            <span>${row.subject}</span>
                            <span>${row.score}/${row.total}</span>
                            <span>${date}</span>
                        </div>
                    `;
                });
            }
            leaderboardSection.innerHTML = html;
        }

        function showSubjectList() {
            subjectsContainer.style.display = 'grid';
            questionSection.style.display = 'none';
            emptyState.style.display = 'none';
            questionList.innerHTML = '';
            resultSummary.style.display = 'none';
            resultSummary.innerHTML = '';
            clearInterval(quizTimer);
            quizTimer = null;
            quizInfo.style.display = 'none';
            startQuizBtn.style.display = 'inline-flex';
            submitQuizBtn.style.display = 'none';
        }

        function selectOption(questionIndex, choiceIndex) {
            selectedAnswers[questionIndex] = choiceIndex;
            const question = currentQuestions[questionIndex];
            const correctIndex = question.answer;
            const container = document.getElementById(`option-list-${questionIndex}`);
            if (!container) return;
            const buttons = container.querySelectorAll('button');
            buttons.forEach((button, index) => {
                button.classList.remove('correct', 'wrong');
                if (index === correctIndex) {
                    button.classList.add('correct');
                }
                if (index === choiceIndex && choiceIndex !== correctIndex) {
                    button.classList.add('wrong');
                }
            });
        }

        async function submitQuiz() {
            if (!currentQuestions.length) return;
            clearInterval(quizTimer);
            submitQuizBtn.style.display = 'none';
            startQuizBtn.style.display = 'inline-flex';
            quizInfo.style.display = 'none';
            questionList.style.display = 'none';
            resultSummary.style.display = 'block';
            resultSummary.innerHTML = '';

            let score = 0;
            let total = 0;
            const summary = document.createElement('div');
            summary.className = 'result-card';

            currentQuestions.forEach((question, index) => {
                const hasOptions = question.options && question.options.length;
                const selected = selectedAnswers[index];
                const correct = question.answer;
                const questionSummary = document.createElement('div');
                questionSummary.className = 'result-card';
                questionSummary.innerHTML = `
                    <h3>Question ${index + 1}</h3>
                    <p>${question.question}</p>
                `;

                if (hasOptions && correct !== null && correct !== undefined) {
                    total += 1;
                    const isCorrect = selected === correct;
                    if (isCorrect) score += 1;
                    const resultText = isCorrect
                        ? 'Correct answer selected.'
                        : `Incorrect — the correct answer is: <strong>${question.options[correct]}</strong>`;
                    const resultType = isCorrect ? 'correct' : 'wrong';
                    const resultAnswer = document.createElement('div');
                    resultAnswer.className = `result-answer ${resultType}`;
                    resultAnswer.innerHTML = resultText;
                    questionSummary.appendChild(resultAnswer);

                    if (selected !== null && selected !== undefined && selected !== correct) {
                        const chosenAnswer = document.createElement('div');
                        chosenAnswer.className = 'result-answer wrong';
                        chosenAnswer.innerHTML = `Your choice: <strong>${question.options[selected] || 'No selection'}</strong>`;
                        questionSummary.appendChild(chosenAnswer);
                    }
                } else {
                    const info = document.createElement('div');
                    info.className = 'result-answer';
                    info.innerHTML = 'This question is not auto-graded because it has no answer choices available.';
                    questionSummary.appendChild(info);
                }

                summary.appendChild(questionSummary);
            });

            const scoreSummary = document.createElement('div');
            scoreSummary.className = 'result-card';
            if (total > 0) {
                scoreSummary.innerHTML = `
                    <h3>Final Score</h3>
                    <p>You scored <strong>${score}</strong> out of <strong>${total}</strong>.</p>
                    <p>${score === total ? 'Great job! All answers are correct.' : 'Review the explanations to improve your score.'}</p>
                `;
            } else {
                scoreSummary.innerHTML = `
                    <h3>Review Complete</h3>
                    <p>There are no graded multiple-choice questions available for this subject yet.</p>
                    <p>Try another subject or check back after more questions are added.</p>
                `;
            }

            // save and refresh leaderboard when a quiz is completed
            if (total > 0) {
                await saveResultToLeaderboard(score, total, currentSubject);
                await renderLeaderboard();
            }
            resultSummary.appendChild(scoreSummary);
            resultSummary.appendChild(summary);
        }

        const selectedAnswers = [];

        function updateAuthNav() {
            const authNavItem = document.getElementById('authNavItem');
            if (!authNavItem) return;
            const isAuthenticated = localStorage.getItem('isAuthenticated') === 'true';
            if (isAuthenticated) {
                authNavItem.innerHTML = '<a href="#" id="logoutLink">Logout</a>';
                const logoutLink = document.getElementById('logoutLink');
                if (logoutLink) {
                    logoutLink.addEventListener('click', (event) => {
                        event.preventDefault();
                        localStorage.removeItem('isAuthenticated');
                        localStorage.removeItem('userEmail');
                        window.location.href = 'login.html';
                    });
                }
            } else {
                authNavItem.innerHTML = '<a href="login.html">Login</a>';
            }
        }

        renderSubjectCards();
        updateAuthNav();
        renderLeaderboard();
