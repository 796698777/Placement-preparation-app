<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gateway - Placement Prep</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-color: #f8fafc;
            --card-bg: rgba(255, 255, 255, 0.95);
            --input-bg: rgba(248, 250, 252, 0.9);
            --accent-primary: #f9a8d4;
            --accent-secondary: #60a5fa;
            --text-main: #0f172a;
            --text-muted: #64748b;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        body {
            background: radial-gradient(circle at top left, rgba(249, 168, 212, 0.35), transparent 22%),
                        radial-gradient(circle at bottom right, rgba(96, 165, 250, 0.28), transparent 22%),
                        linear-gradient(135deg, #f8fafc 0%, #eff6ff 40%, #fdf2f8 100%);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 1.5rem;
        }
        
        .auth-card {
            background: var(--card-bg);
            border: 1px solid rgba(96, 165, 250, 0.22);
            backdrop-filter: blur(14px);
            width: 100%;
            max-width: 420px;
            padding: 3rem 2.5rem;
            border-radius: 20px;
            box-shadow: 0 24px 50px rgba(96, 165, 250, 0.12);
            text-align: center;
        }
        .logo {
            font-size: 1.8rem;
            font-weight: 700;
            background: linear-gradient(45deg, var(--accent-primary), var(--accent-secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 2rem;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
        }
        h2 { font-size: 1.4rem; margin-bottom: 1.5rem; color: var(--text-main); }
        .input-group { position: relative; margin-bottom: 1.25rem; text-align: left; }
        .input-group i { position: absolute; left: 1rem; top: 50%; transform: translateY(-50%); color: var(--text-muted); }
        .input-group input {
            width: 100%;
            padding: 0.85rem 1rem 0.85rem 2.75rem;
            background: var(--input-bg);
            border: 1px solid rgba(96, 165, 250, 0.25);
            border-radius: 10px;
            color: var(--text-main);
            font-size: 0.95rem;
            outline: none;
            transition: border-color 0.3s;
        }
        .input-group input:focus { border-color: var(--accent-primary); }
        .btn {
            width: 100%;
            padding: 0.85rem;
            background: linear-gradient(45deg, var(--accent-primary), var(--accent-secondary));
            color: #0f172a;
            border: none;
            border-radius: 10px;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            margin-top: 0.5rem;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .btn:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(56, 189, 248, 0.4); }
        .switch-mode { margin-top: 1.5rem; font-size: 0.85rem; color: var(--text-muted); }
        .switch-mode span { color: var(--accent-primary); cursor: pointer; font-weight: 600; text-decoration: underline; }
        .alert { padding: 0.75rem; border-radius: 8px; font-size: 0.85rem; margin-bottom: 1rem; display: none; text-align: left; }
        .alert-error { background: rgba(239, 68, 68, 0.2); border: 1px solid #ef4444; color: #fca5a5; }
        .alert-success { background: rgba(34, 197, 94, 0.2); border: 1px solid #22c55e; color: #bbf7d0; }
    </style>
</head>
<body>

    <div class="auth-card">
        <div class="logo"><i class="fa-solid fa-graduation-cap"></i> PlacementPrep</div>
        <h2 id="formTitle">Account Identity Verification</h2>
        
        <div id="alertBox" class="alert alert-error"></div>

        <form id="authForm">
            <div class="input-group">
                <i class="fa-solid fa-envelope"></i>
                <input type="email" id="emailInput" placeholder="Enter registration email" required>
            </div>
            <div class="input-group">
                <i class="fa-solid fa-lock"></i>
                <input type="password" id="passwordInput" placeholder="Enter secure password" required>
            </div>
            <button type="submit" class="btn" id="submitBtn">Proceed Log In</button>
        </form>

        <p class="switch-mode" id="toggleText">
            First time using the platform? <span onclick="switchMode('signup')">Create Cloud Profile</span>
        </p>
    </div>

    <script>
        const isAuthenticated = localStorage.getItem('isAuthenticated') === 'true';
        if (isAuthenticated) {
            window.location.href = 'index.html';
        }

        let currentMode = 'login'; // Modes can toggle cleanly: 'login' or 'signup'
        const API_URL = 'http://localhost:5000/api/auth';

        function switchMode(mode) {
            currentMode = mode;
            const title = document.getElementById('formTitle');
            const submitBtn = document.getElementById('submitBtn');
            const toggleText = document.getElementById('toggleText');
            const alertBox = document.getElementById('alertBox');
            
            alertBox.style.display = 'none';

            if (mode === 'signup') {
                title.innerText = 'Establish Cloud Profile';
                submitBtn.innerText = 'Register & Save Credentials';
                toggleText.innerHTML = `Already have a pipeline tracking? <span onclick="switchMode('login')">Return Log In</span>`;
            } else {
                title.innerText = 'Account Identity Verification';
                submitBtn.innerText = 'Proceed Log In';
                toggleText.innerHTML = `First time using the platform? <span onclick="switchMode('signup')">Create Cloud Profile</span>`;
            }
        }

        document.getElementById('authForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('emailInput').value;
            const password = document.getElementById('passwordInput').value;
            const alertBox = document.getElementById('alertBox');

            alertBox.style.display = 'none';

            try {
                // Endpoint maps dynamically onto either /api/auth/login or /api/auth/signup
                const response = await fetch(`${API_URL}/${currentMode}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });

                const data = await response.json();

                if (!response.ok) {
                    throw new Error(data.message || 'Authentication processing error occurred.');
                }

                // If handling account registration conversion, provide success alert and transition to login screen
                if (currentMode === 'signup') {
                    alertBox.className = "alert alert-success";
                    alertBox.innerText = "🚀 Account created in Atlas! Redirecting into Login interface context...";
                    alertBox.style.display = 'block';
                    setTimeout(() => switchMode('login'), 2000);
                } else {
                    // Save session token verification locally and advance to home dashboard
                    localStorage.setItem('isAuthenticated', 'true');
                    localStorage.setItem('userEmail', email);
                    window.location.href = 'index.html';
                }

            } catch (error) {
                alertBox.className = "alert alert-error";
                alertBox.innerText = error.message;
                alertBox.style.display = 'block';
            }
        });
    </script>
</body>
</html>
